<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Automated Tank System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="page-wrapper">
    <div class="login-box">
        
        <h1 class="main-title">Create Account</h1>
<form id="registerForm">
    <div class="input-group">
        <label class="field-label">Hardware ID (ESP32 UID)</label>
        <input type="text" id="tankId" name="tank_id" readonly placeholder="Scan QR to Link" required>
        <button type="button" id="openScannerBtn" class="scan-trigger-btn">
            <i class="fas fa-camera"></i>
        </button>
    </div>

    <div class="input-row">
        <div class="input-group">
            <input type="text" id="regName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="email" id="regEmail" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="text" id="regPhone" placeholder="Phone Number" required>
        </div>
    </div>

    <div class="input-group">
        <input type="password" id="regPassword" placeholder="Password" required>
        <i class="fa-solid fa-eye-slash toggle-eye" id="toggleRegPassword"></i>
    </div>

    <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <i class="fa-solid fa-eye-slash toggle-eye" id="toggleConfirmPassword"></i>
    </div>

    <button type="submit" class="login-btn">Register Account</button>
</form>
    </div>
</div>

<div id="scannerOverlay" class="scanner-modal-overlay" style="display: none;">
    <div class="scanner-modal-content">
        <div class="modal-header-custom">
            <h5 class="modal-title"><i class="fas fa-cog"></i> Tank Configuration</h5>
            <button type="button" id="closeScannerBtn" class="btn-close-custom">&times;</button>
        </div>
        
        <div class="modal-body-custom">
            <div class="step-indicator">
                <i class="fas fa-qrcode"></i> Step 1: Scan Tank QR Code
            </div>
            <p class="instruction-text">You must scan the device QR code first before you can fill up the form.</p>
            
            <div id="qr-reader-container">
                <div id="qr-reader"></div>
            </div>
            
            <div id="scan-status" class="status-waiting">
                <i class="fas fa-camera"></i> Waiting for camera...
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
