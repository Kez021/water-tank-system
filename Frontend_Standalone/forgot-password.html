<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Automated Tank System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Gloock&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .main-logo {
            width: 80px;
            margin-bottom: 15px;
        }

        .main-title {
            font-family: 'Gloock', serif;
            font-size: 24px;
            color: #333;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative; /* Importante para sa eye icon positioning */
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .input-group i {
            position: absolute;
            right: 15px;
            top: 13px;
            cursor: pointer;
            color: #666;
        }

        .login-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #0056b3;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .form-footer {
            margin-top: 20px;
        }

        .forgot-link {
            text-decoration: none;
            color: #007bff;
            font-size: 13px;
        }

        .register-text {
            font-size: 14px;
            color: #666;
        }

      
        #otpInput {
            text-align: center;
            letter-spacing: 8px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <div class="login-box">
        <img src="image/tanklogo.png" alt="Logo" class="main-logo">
        <h1 class="main-title">Password Recovery</h1>

        <div id="step-email">
            <p class="register-text">Enter your email to receive a 6-digit OTP.</p>
            <div class="input-group">
                <input type="email" id="forgotEmail" placeholder="Enter registered email" required>
            </div>
            <div class="btn-row">
                <button type="button" id="sendOtpBtn" class="login-btn">Send OTP</button>
            </div>
        </div>

        <div id="step-otp" style="display: none;">
            <p class="register-text">Enter the 6-digit code from your email.</p>
            <div class="input-group">
                <input type="text" id="otpInput" placeholder="000000" maxlength="6">
            </div>
            <div class="btn-row">
                <button type="button" id="verifyOtpBtn" class="login-btn">Verify OTP</button>
            </div>
        </div>

        <div id="step-reset" style="display: none;">
            <p class="register-text">Create your new secure password.</p>
            <div class="input-group">
                <input type="password" id="newPassword" placeholder="New Password" required>
                <i class="fa-solid fa-eye-slash" id="toggleNewPassword"></i>
            </div>
            <div class="btn-row">
                <button type="button" id="resetPassBtn" class="login-btn">Reset Password</button>
            </div>
        </div>

        <div class="form-footer">
            <a href="login.html" class="forgot-link">Back to Login</a>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
