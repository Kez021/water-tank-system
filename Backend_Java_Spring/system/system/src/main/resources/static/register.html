<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Automated Tank System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Gloock&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="analytic.css">
</head>
<body>

<div class="page-wrapper">
    <div class="login-box">

        <img src="image/tanklogo.png" alt="Logo" class="main-logo">
        <h1 class="main-title">Create Client Account</h1>

<form id="registerForm">
    <div class="input-row">
        <div class="input-group">
            <input type="text" id="regName" placeholder="Full Name" required>
        </div>
        <div class="input-group">
            <input type="email" id="regEmail" placeholder="Email Address" required>
        </div>
    </div>

    <div class="input-row">
        <div class="input-group">
            <input type="text" id="regPhone" placeholder="Phone Number" required>
        </div>
        <div class="input-group">
            <input type="password" id="regPassword" placeholder="Password" required>
            <i class="fa-solid fa-eye-slash toggle-eye" id="toggleRegPassword"></i>
        </div>
    </div>

    <div class="input-group confirm-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <i class="fa-solid fa-eye-slash toggle-eye" id="toggleConfirmPassword"></i>
    </div>

    <div class="btn-row">
        <button type="submit" class="login-btn">
            Register
        </button>
    </div>

    <div class="form-footer">
        <p class="register-text">
            Already have an account?
            <a href="analytic.html" class="reg-bold">Login</a>
        </p>
    </div>
</form>
<script src="register.js"></script>
</body>
</html>
