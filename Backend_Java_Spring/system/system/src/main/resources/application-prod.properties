# ==========================================================
# PROD PROFILE — PostgreSQL (Railway online)
# Active when SPRING_PROFILES_ACTIVE=prod env var is set
# Reads Railway's auto-injected JDBC_DATABASE_URL / PGUSER / PGPASSWORD
# ==========================================================
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console online
spring.h2.console.enabled=false

# Connection pool tuning for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
