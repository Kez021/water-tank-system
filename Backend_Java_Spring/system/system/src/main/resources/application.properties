# ==========================================================
# MAIN CONFIG — auto-detects which profile to use
# Local (IntelliJ) → "local" profile → H2 database
# Railway (online) → "prod" profile → PostgreSQL database
# ==========================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.application.name=tank-system
server.port=${PORT:8080}

# JPA (shared by both profiles)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# File upload (Support Tickets)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

