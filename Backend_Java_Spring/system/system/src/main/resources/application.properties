# ==========================================================
# APPLICATION CONFIGURATION — Automated Overhead Tank System
# ==========================================================
# HOW THIS WORKS:
#   LOCAL (IntelliJ on your laptop): Uses H2 database automatically
#   RAILWAY (deployed online):       Uses PostgreSQL automatically
#   You do NOT need to change anything — Spring Boot detects which one to use
# ==========================================================
spring.application.name=tank-system

# ----------------------------------------------------------
# DATABASE — SMART AUTO-DETECT
# When DATABASE_URL environment variable EXISTS (Railway sets this automatically):
#   → Uses PostgreSQL (online, permanent storage)
# When DATABASE_URL does NOT exist (your laptop):
#   → Uses H2 (local file database)
# ----------------------------------------------------------

# LOCAL H2 database (your laptop — IntelliJ)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/tank_db}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (only works locally, Railway ignores this)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ----------------------------------------------------------
# FILE UPLOAD (Support Ticket photo/video attachments)
# ----------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

